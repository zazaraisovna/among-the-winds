<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Among the Winds</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .logo img {
      max-width: 280px;
      margin-top: 60px;
    }

    h1 {
      font-size: 40px;
      margin: 10px 0;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .buttons {
      margin: 30px 0;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 14px 22px;
      border-radius: 14px;
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(6px);
      transition: 0.3s;
    }

    .buttons a:hover {
      background: rgba(56, 189, 248, 0.3);
      transform: translateY(-2px);
    }

    .screenshots {
      margin: 60px 0;
    }

    .screenshots h2 {
      margin-bottom: 20px;
      font-weight: 400;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .about {
      margin: 60px 0;
      font-size: 17px;
      line-height: 1.6;
      opacity: 0.85;
    }

    .socials a {
      margin: 0 12px;
      color: #38bdf8;
      text-decoration: none;
      font-size: 16px;
    }

    footer {
      margin: 50px 0;
      font-size: 13px;
      opacity: 0.5;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <img src="logo.png" alt="Among the Winds Logo">
    </div>

    <h1>Among the Winds</h1>

    <div class="tagline">
      Атмосферное приключение о ветре, пути и внутренней силе
    </div>

    <div class="buttons">
      <a href="#">Скачать на Android</a>
      <a href="https://zaza.itch.io/among-the-winds">Играть (itch.io)</a>
    </div>

    <div class="screenshots">
      <h2>Скриншоты</h2>
      <div class="gallery">
        <img src="screen1.png">
        <img src="screen2.png">
        <img src="screen3.png">
      </div>
    </div>

    <div class="about">
      Исследуйте мир, вдохновлённый природой и легендами. Используйте силу ветра, чтобы преодолевать препятствия и находить свой путь.
    </div>

    <div class="socials">
      <a href="#">Telegram</a>
      <a href="#">itch.io</a>
      <a href="#">YouTube</a>
    </div>

    <footer>
      © 2026 Among the Winds
    </footer>

  </div>

</body>
</html>
